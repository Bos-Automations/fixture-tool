{% extends "base.html" %}
{% block title %}{{ project.name or 'Project' }} - Fixture Tool{% endblock %}

{% block nav_right %}
<div class="save-status" id="saveStatus">Saved</div>
{% endblock %}

{% block content %}
<div class="editor">
    <!-- Project Header -->
    <div class="project-header">
        <div class="project-header-fields">
            <div class="form-group">
                <label>Project Name</label>
                <input type="text" value="{{ project.name }}" data-project-field="name" class="project-field input-lg">
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" value="{{ project.address }}" data-project-field="address" class="project-field input-lg">
            </div>
        </div>
        <div class="project-settings">
            <div class="form-group form-group-inline">
                <label>Parts &amp; Extras %</label>
                <input type="number" step="0.1" value="{{ project.parts_extras_pct }}" data-project-field="parts_extras_pct" class="project-field input-sm">
            </div>
            <div class="form-group form-group-inline">
                <label>Tax %</label>
                <input type="number" step="0.1" value="{{ project.tax_pct }}" data-project-field="tax_pct" class="project-field input-sm">
            </div>
            <div class="form-group form-group-inline">
                <label>Shipping %</label>
                <input type="number" step="0.1" value="{{ project.shipping_pct }}" data-project-field="shipping_pct" class="project-field input-sm">
            </div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
        <button class="tab active" data-tab="recessed">Recessed</button>
        <button class="tab" data-tab="linear">Linear</button>
        <button class="tab" data-tab="decorative">Decorative</button>
        <button class="tab" data-tab="landscape">Landscape</button>
    </div>

    <!-- Recessed Fixtures -->
    <div class="tab-content active" id="tab-recessed">
        <div class="fixture-list" id="list-recessed">
        </div>
        <button class="btn btn-add" onclick="addFixture('recessed_fixtures', 'recessed')">+ Add Recessed Fixture</button>
        <div style="height:12px"></div>
        <div class="fixture-list" id="list-recessed-accessory">
        </div>
        <button class="btn btn-add" onclick="addFixture('recessed_accessories', 'recessed-accessory')">+ Add Accessory</button>
    </div>

    <!-- Linear Fixtures -->
    <div class="tab-content" id="tab-linear">
        <div class="fixture-list" id="list-linear">
        </div>
        <button class="btn btn-add" onclick="addFixture('linear_fixtures', 'linear')">+ Add Linear Fixture</button>
        <div style="height:12px"></div>
        <div class="fixture-list" id="list-linear-accessory">
        </div>
        <button class="btn btn-add" onclick="addFixture('linear_accessories', 'linear-accessory')">+ Add Accessory</button>
    </div>

    <!-- Decorative Fixtures -->
    <div class="tab-content" id="tab-decorative">
        <div class="fixture-list" id="list-decorative">
        </div>
        <button class="btn btn-add" onclick="addFixture('decorative_fixtures', 'decorative')">+ Add Decorative Fixture</button>
        <div style="height:12px"></div>
        <div class="fixture-list" id="list-decorative-accessory">
        </div>
        <button class="btn btn-add" onclick="addFixture('decorative_accessories', 'decorative-accessory')">+ Add Accessory</button>
    </div>

    <!-- Landscape Fixtures -->
    <div class="tab-content" id="tab-landscape">
        <div class="fixture-list" id="list-landscape">
        </div>
        <button class="btn btn-add" onclick="addFixture('landscape_fixtures', 'landscape')">+ Add Landscape Fixture</button>
        <div style="height:12px"></div>
        <div class="fixture-list" id="list-transformer">
        </div>
        <button class="btn btn-add" onclick="addFixture('landscape_transformers', 'transformer')">+ Add Transformer</button>
        <div style="height:12px"></div>
        <div class="fixture-list" id="list-accessory">
        </div>
        <button class="btn btn-add" onclick="addFixture('landscape_accessories', 'accessory')">+ Add Accessory</button>
    </div>

    <!-- Reports -->
    <div class="report-bar">
        <span class="report-label">Reports:</span>
        <a href="/project/{{ project.id }}/report/fixture" target="_blank" class="btn btn-secondary btn-sm">Fixture Schedule</a>
        <a href="/project/{{ project.id }}/report/dealer" target="_blank" class="btn btn-secondary btn-sm">Dealer Pricing</a>
        <a href="/project/{{ project.id }}/report/list" target="_blank" class="btn btn-secondary btn-sm">List Pricing</a>
        <a href="/project/{{ project.id }}/purchase-order" target="_blank" class="btn btn-secondary btn-sm">Purchase Order</a>
    </div>
</div>

<!-- Recessed fixture template -->
<template id="tpl-recessed">
    <div class="fixture-row" data-table="recessed_fixtures" data-id="__ID__">
        <div class="fixture-summary" onclick="toggleExpand(this)">
            <span class="drag-handle" title="Drag to reorder">&#9776;</span>
            <span class="fixture-id-display">__FIXTURE_ID__</span>
            <span class="fixture-desc-display">__DESCRIPTION__</span>
            <span class="fixture-qty-display">Qty: __QTY__</span>
            <div class="status-dots">
                <span class="status-dot" data-component="housing" title="Housing"></span>
                <span class="status-dot" data-component="module" title="Module"></span>
                <span class="status-dot" data-component="trim" title="Trim"></span>
                <span class="status-dot" data-component="driver" title="Driver"></span>
            </div>
            <span class="expand-icon">&#9660;</span>
        </div>
        <div class="fixture-detail">
            <div class="detail-grid">
                <div class="detail-section detail-section-basic">
                    <h4>General</h4>
                    <div class="field-row">
                        <div class="form-group"><label>ID</label><input type="text" data-field="fixture_id" value=""></div>
                        <div class="form-group form-group-wide"><label>Description</label><input type="text" data-field="description" value=""></div>
                        <div class="form-group"><label>Qty</label><input type="number" min="1" data-field="quantity" value="1"></div>
                    </div>
                    <div class="field-row">
                        <div class="form-group"><label>CCT</label><input type="text" data-field="cct" value="" placeholder="e.g., 2700K"></div>
                        <div class="form-group"><label>Beam Spread</label><input type="text" data-field="beam_spread" value="" placeholder="e.g., 40°"></div>
                        <div class="form-group"><label>Type</label>
                            <select data-field="fixture_type">
                                {% for ft in fixture_type_options %}<option value="{{ ft }}">{{ ft }}</option>{% endfor %}
                            </select>
                        </div>
                        <div class="form-group"><label>Control</label>
                            <select data-field="control_type">
                                {% for ct in control_type_options %}<option value="{{ ct }}">{{ ct or '—' }}</option>{% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="field-row">
                        <div class="form-group"><label>Trim</label>
                            <select data-field="trim_style">
                                {% for ts in trim_style_options %}<option value="{{ ts }}">{{ ts or '—' }}</option>{% endfor %}
                            </select>
                        </div>
                        <div class="form-group"><label>Trim Color</label><input type="text" data-field="trim_color" value="" placeholder="e.g., White"></div>
                        <div class="form-group"><label>Color</label>
                            <div class="color-picker" data-field="color">
                                {% for c in fixture_colors %}
                                <button type="button" class="color-swatch{% if not c.value %} color-swatch-none{% endif %}" data-color="{{ c.value }}" style="background:{{ c.hex }};" title="{{ c.label }}"></button>
                                {% endfor %}
                            </div>
                        </div>
                    </div>
                </div>

                <div class="detail-section" data-component-section="housing">
                    <h4>Housing <span class="approved-date-display" data-date-for="housing_approved_date"></span></h4>
                    <div class="field-row">
                        <div class="form-group"><label>Part #</label><input type="text" data-field="housing_part_no" value="" data-lockable="housing"></div>
                        <div class="form-group"><label>Dealer $</label><input type="number" step="0.01" inputmode="decimal" data-field="housing_dealer_price" value="0" data-lockable="housing"></div>
                        <div class="form-group"><label>List $</label><input type="number" step="0.01" inputmode="decimal" data-field="housing_list_price" value="0" data-lockable="housing"></div>
                        <div class="form-group"><label>Status</label>
                            <select data-field="housing_status" class="status-select">
                                {% for s in status_options %}<option value="{{ s }}">{{ s or '—' }}</option>{% endfor %}
                            </select>
                        </div>
                    </div>
                </div>

                <div class="detail-section" data-component-section="module">
                    <h4>Module <span class="approved-date-display" data-date-for="module_approved_date"></span></h4>
                    <div class="field-row">
                        <div class="form-group"><label>Part #</label><input type="text" data-field="module_part_no" value="" data-lockable="module"></div>
                        <div class="form-group"><label>Dealer $</label><input type="number" step="0.01" inputmode="decimal" data-field="module_dealer_price" value="0" data-lockable="module"></div>
                        <div class="form-group"><label>List $</label><input type="number" step="0.01" inputmode="decimal" data-field="module_list_price" value="0" data-lockable="module"></div>
                        <div class="form-group"><label>Status</label>
                            <select data-field="module_status" class="status-select">
                                {% for s in status_options %}<option value="{{ s }}">{{ s or '—' }}</option>{% endfor %}
                            </select>
                        </div>
                    </div>
                </div>

                <div class="detail-section" data-component-section="trim">
                    <h4>Trim <span class="approved-date-display" data-date-for="trim_approved_date"></span></h4>
                    <div class="field-row">
                        <div class="form-group"><label>Part #</label><input type="text" data-field="trim_part_no" value="" data-lockable="trim"></div>
                        <div class="form-group"><label>Dealer $</label><input type="number" step="0.01" inputmode="decimal" data-field="trim_dealer_price" value="0" data-lockable="trim"></div>
                        <div class="form-group"><label>List $</label><input type="number" step="0.01" inputmode="decimal" data-field="trim_list_price" value="0" data-lockable="trim"></div>
                        <div class="form-group"><label>Status</label>
                            <select data-field="trim_status" class="status-select">
                                {% for s in status_options %}<option value="{{ s }}">{{ s or '—' }}</option>{% endfor %}
                            </select>
                        </div>
                    </div>
                </div>

                <div class="detail-section" data-component-section="driver">
                    <h4>Driver <span class="approved-date-display" data-date-for="driver_approved_date"></span></h4>
                    <div class="field-row">
                        <div class="form-group"><label>Part #</label><input type="text" data-field="driver_part_no" value="" data-lockable="driver"></div>
                        <div class="form-group"><label>Dealer $</label><input type="number" step="0.01" inputmode="decimal" data-field="driver_dealer_price" value="0" data-lockable="driver"></div>
                        <div class="form-group"><label>List $</label><input type="number" step="0.01" inputmode="decimal" data-field="driver_list_price" value="0" data-lockable="driver"></div>
                        <div class="form-group"><label>Status</label>
                            <select data-field="driver_status" class="status-select">
                                {% for s in status_options %}<option value="{{ s }}">{{ s or '—' }}</option>{% endfor %}
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="fixture-actions">
                <button class="btn btn-secondary btn-sm" onclick="duplicateFixture(this)">Duplicate</button>
                <button class="btn btn-danger btn-sm" onclick="deleteFixture(this)">Delete</button>
            </div>
        </div>
    </div>
</template>
